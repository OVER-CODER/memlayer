# Render Blueprint Configuration for MemLayer Backend
# Use: render blueprint create --file render.yaml

services:
  # MemLayer Backend Service
  - name: memlayer-backend
    type: web
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database (PostgreSQL - Supabase)
      - key: DATABASE_URL
        sync: false
        value: "postgresql+asyncpg://postgres.memlayer:Aryanpandit@2373@aws-0-ap-northeast-2.pooler.supabase.com:6543/postgres"
      
      - key: ASYNC_DATABASE_URL
        sync: false
        value: "postgresql+asyncpg://postgres.memlayer:Aryanpandit@2373@aws-0-ap-northeast-2.pooler.supabase.com:6543/postgres"
      
      # Redis (Upstash)
      - key: REDIS_HOST
        sync: false
        value: "pleased-pig-121933.upstash.io"
      
      - key: REDIS_PORT
        value: "6379"
      
      - key: REDIS_PASSWORD
        sync: false
        value: "gQAAAAAAAdxNAAIgcDFkOWRiN2RhODkxMTY0MTBiOGQ1Zjc0OThiOWNhYWJjNA"
      
      # Security
      - key: SECRET_KEY
        sync: false
        value: "PlEZVYgLfdt-IjuYVZyR1pSlBMxFqdHV4FB2FUkdWac"
      
      - key: SECURITY_ENABLED
        value: "true"
      
      # Runtime
      - key: DEBUG
        value: "false"
      
      - key: LOG_LEVEL
        value: "INFO"
      
      - key: DETERMINISTIC_MODE
        value: "true"
      
      # LLM Provider (Gemini)
      - key: GEMINI_API_KEY
        sync: false
        value: "AIzaSyAvuFbsaFT2jkyQnM6yDjRF80i31YOfBJw"
      
      # Embedding
      - key: EMBEDDING_MODEL
        value: "all-MiniLM-L6-v2"
      
      - key: EMBEDDING_DIM
        value: "384"
      
      # Memory
      - key: TOP_K_MEMORIES
        value: "5"
      
      - key: MEMORY_RETRIEVAL_THRESHOLD
        value: "0.3"
      
      # Storage
      - key: STORAGE_PROVIDER
        value: "local"
    
    # Health check configuration
    healthCheck:
      path: /health/ready
      interval: 30
      timeout: 10
      retries: 3
      startPeriod: 60
    
    # Auto-deploy from branch
    autoDeployBranch: phase11/frontend-console
    
    # Instance settings
    instances: 1
    
    # Plan (free for initial testing)
    plan: free