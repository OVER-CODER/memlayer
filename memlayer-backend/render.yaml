# Render Blueprint Configuration for MemLayer Backend
# ⚠️ IMPORTANT: Never commit actual API keys - use environment variables in Render dashboard

services:
  # MemLayer Backend Service
  - name: memlayer-backend
    type: web
    region: oregon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database (PostgreSQL - Supabase)
      - key: DATABASE_URL
        value: "postgresql://postgres:memlayer%402373@db.ierjjxnthhnbkbcxynuv.supabase.co:5432/postgres?sslmode=require"
      
      - key: ASYNC_DATABASE_URL
        value: "postgresql+asyncpg://postgres:memlayer%402373@db.ierjjxnthhnbkbcxynuv.supabase.co:5432/postgres?sslmode=require"
      
      # Redis (Upstash)
      - key: REDIS_HOST
        value: "pleased-pig-121933.upstash.io"
      
      - key: REDIS_PORT
        value: "6379"
      
      - key: REDIS_PASSWORD
        value: "gQAAAAAAAdxNAAIgcDFkOWRiN2RhODkxMTY0MTBiOGQ1Zjc0OThiOWNhYWJjNA"
      
      # Security
      - key: SECRET_KEY
        value: "memlayer-prod-secret-key-2026"
      
      - key: SECURITY_ENABLED
        value: "true"
      
      # Runtime
      - key: DEBUG
        value: "false"
      
      - key: LOG_LEVEL
        value: "INFO"
      
      - key: DETERMINISTIC_MODE
        value: "true"
      
      # LLM Provider (Gemini)
      - key: GEMINI_API_KEY
        value: "AIzaSyAvuFbsaFT2jkyQnM6yDjRF80i31YOfBJw"
      
      # Embedding
      - key: EMBEDDING_MODEL
        value: "all-MiniLM-L6-v2"
      
      - key: EMBEDDING_DIM
        value: "384"
      
      # Memory
      - key: TOP_K_MEMORIES
        value: "5"
      
      - key: MEMORY_RETRIEVAL_THRESHOLD
        value: "0.3"
      
      # Storage
      - key: STORAGE_PROVIDER
        value: "local"